name: Update visitor stats
on:
  schedule:
    # Every 10 minutes (GitHub's floor is 5; schedules are best-effort and
    # may lag under load). Commits/deploys still happen only when data changed.
    - cron: '*/10 * * * *'
  workflow_dispatch:
permissions:
  contents: write
  actions: write
# Never let two stats runs overlap (a slow run + the next tick would race the push).
concurrency:
  group: visitor-stats
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/fetch-visitor-stats.mjs
        env:
          GOATCOUNTER_SITE: saifulislamsalim
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
      # Pushes made with GITHUB_TOKEN do not trigger on:push workflows,
      # so dispatch the deploy explicitly after committing.
      - name: Commit and deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet src/data/visitors.json; then
            echo "No change in visitor stats"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/visitors.json
          git commit -m "chore: update visitor stats"
          git push
          gh workflow run deploy.yml --ref main
